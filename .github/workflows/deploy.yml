name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy code to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Ensure the directory exists and it is a git repo
          if [ ! -d "/home/ubuntu/CRM" ]; then
            echo "Directory /home/ubuntu/CRM not found. Creating and cloning..."
            git clone https://github.com/Nimmagadda-Abhishek/Globxplorer.git /home/ubuntu/CRM
          fi

          cd /home/ubuntu/CRM

          if [ ! -d ".git" ]; then
            echo "Not a git repository. Please clone manually once or update this script with repo URL."
            # exit 1 (Optional: uncomment if you want to fail the action)
          else
            git pull origin main
          fi

          # 2. Install dependencies
          npm install

          # 3. Create/Update .env file from secrets
          cat <<EOF > .env
          NODE_ENV=production
          PORT=5000
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          
          WHATSAPP_API_URL=${{ secrets.WHATSAPP_API_URL }}
          WHATSAPP_API_TOKEN=${{ secrets.WHATSAPP_API_TOKEN }}
          
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          FROM_EMAIL=${{ secrets.FROM_EMAIL }}
          FROM_NAME="${{ secrets.FROM_NAME }}"
          
          CLIENT_URL=${{ secrets.CLIENT_URL }}
          EOF

          # 4. Zero-downtime cluster reload with PM2 ecosystem file
          pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
          pm2 save
